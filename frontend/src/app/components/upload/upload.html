<div *ngIf="folder" class="px-3 py-2 d-flex align-items-center gap-3" style="background: rgba(13,202,240,0.04);">
  <!-- Icon -->
  <div class="rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
       style="width:36px;height:36px;background:rgba(13,202,240,0.1);">
    <i class="bi bi-cloud-arrow-up text-info"></i>
  </div>

  <!-- Label -->
  <div class="flex-grow-1" style="min-width:0;">
    <p class="mb-0 small fw-semibold text-light text-truncate">
      Upload to <span class="text-info">{{ folder.name }}</span>
      <span class="text-secondary ms-1 x-small text-uppercase">PDF, DOCX, CSV, TXT, PNG...</span>
    </p>
    <div *ngIf="uploadStatus()" 
         class="small mt-1 fw-semibold d-flex align-items-center gap-1"
         [class.text-info]="!uploadStatus().includes('failed')"
         [class.text-danger]="uploadStatus().includes('failed')">
      <div *ngIf="isUploading()" class="spinner-border spinner-border-sm" role="status"></div>
      {{ uploadStatus() }}
    </div>
  </div>

  <!-- Button -->
  <button class="btn btn-info btn-sm rounded-pill px-3 flex-shrink-0"
          (click)="fileInput.click()"
          [disabled]="isUploading()">
    <i class="bi bi-plus-lg me-1"></i>Select
  </button>

  <input #fileInput type="file" class="d-none" (change)="onFileSelected($event)" [disabled]="isUploading()">
</div>
