<div class="d-flex flex-column h-100" style="background: #0a0a12;">
  <!-- Chat Header -->
  <div class="flex-shrink-0 px-3 py-2 border-bottom border-secondary d-flex align-items-center justify-content-between" style="background:#0f0f1a;">
    <div>
      <span class="fw-semibold text-light small">
        {{ folder ? folder.name : (project ? project.name : 'Select a Context') }}
      </span>
      <span class="text-uppercase ms-2 x-small" style="color: #555;">
        {{ folder ? 'Folder Context' : (project ? 'Project Context' : '') }}
      </span>
    </div>
    <span *ngIf="project" class="badge rounded-pill px-2" style="background:rgba(13,202,240,0.15);color:#0dcaf0;font-size:0.65rem;">Active</span>
  </div>

  <!-- Messages -->
  <div #chatContainer (scroll)="onScroll()" class="flex-grow-1 overflow-auto px-3 py-3 d-flex flex-column gap-3" style="scrollbar-gutter:stable; min-height:0;">
    <div *ngFor="let msg of messages()"
         class="d-flex"
         [class.justify-content-end]="msg.role === 'user'">

      <!-- User bubble -->
      <div *ngIf="msg.role === 'user'"
           class="px-3 py-2 rounded-3 small"
           style="background:linear-gradient(135deg,#0d6efd,#0dcaf0);color:#fff;max-width:72%;border-bottom-right-radius:4px!important;line-height:1.5;">
        {{ msg.content }}
      </div>

      <!-- AI bubble with markdown rendering -->
      <div *ngIf="msg.role === 'assistant'"
           class="px-3 py-2 rounded-3 markdown-body"
           style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#d0d0e0;max-width:88%;border-bottom-left-radius:4px!important;font-size:0.875rem;line-height:1.6;"
           [innerHTML]="renderMarkdown(msg.content)">
      </div>
    </div>

    <!-- Typing indicator -->
    <div *ngIf="isTyping()" class="d-flex">
      <div class="px-3 py-2 rounded-3 d-flex align-items-center gap-2"
           style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);">
        <span class="typing-dot"></span>
        <span class="typing-dot" style="animation-delay:0.2s;"></span>
        <span class="typing-dot" style="animation-delay:0.4s;"></span>
        <span class="text-secondary x-small ms-1">Thinking...</span>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="flex-shrink-0 px-3 py-2 border-top border-secondary" style="background:#0f0f1a;">
    <form (submit)="sendMessage()" class="d-flex gap-2">
      <input type="text"
             [(ngModel)]="userInput"
             name="userInput"
             placeholder="Ask a question about your documents..."
             class="form-control form-control-sm border-secondary text-light"
             style="background:rgba(255,255,255,0.05);font-size:0.875rem;"
             [disabled]="!project && !folder">
      <button type="submit"
              class="btn btn-info btn-sm px-3 fw-semibold flex-shrink-0"
              [disabled]="!userInput.trim() || (!project && !folder)">
        <i class="bi bi-send-fill me-1"></i>Send
      </button>
    </form>
  </div>
</div>

<style>
.x-small { font-size: 0.65rem; }
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #0dcaf0;
  display: inline-block;
  animation: blink 1.2s infinite;
}
@keyframes blink {
  0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
/* Markdown styles inside AI bubble */
.markdown-body h3, .markdown-body h4, .markdown-body h5 { margin-top: 0.75rem; margin-bottom: 0.25rem; }
.markdown-body ul { padding-left: 1.2rem; margin: 0.25rem 0; }
.markdown-body p { margin-bottom: 0.4rem; }
.markdown-body p:last-child { margin-bottom: 0; }
.markdown-body a { color: #0dcaf0; }
.markdown-body hr { border-color: rgba(255,255,255,0.1); margin: 0.5rem 0; }
</style>
